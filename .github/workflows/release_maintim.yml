name: Release Maintim WRT
run-name: Maintim Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_er1_libwrt
        options:
          - jdcloud_er1_libwrt
      update_feeds:
        required: false
        description: 'Update Feeds (ignore lock and save latest)'
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  UPDATE_FEEDS: ${{ inputs.update_feeds && '1' || '0' }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/staging_dir
            ./action_build/dl
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./build_maintim.sh ${{ inputs.model }}
        env:
          UPDATE_FEEDS: ${{ env.UPDATE_FEEDS }}

      - name: Get Kernel Version
        run: |
          echo "KVER=$(grep -oP '^kernel.*' ./firmware/*.manifest | grep -oP '[4-6]\.[0-9]{1,3}\.[0-9]{1,3}')" >> $GITHUB_ENV

      - name: Prepare Release Body
        run: |
          echo "## JDCloud ER1 Maintim Firmware" > release_body.txt
          echo "" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "LAN: 192.168.1.1" >> release_body.txt

      - name: Commit Feed Locks
        if: always()
        run: |
          if git diff --quiet wrt_core/feed_locks.ini 2>/dev/null; then
            echo "feed_locks.ini unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wrt_core/feed_locks.ini
            git commit -m "chore: 更新 feed 锁定"
            git push
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ./firmware/*.*
          body_path: ./release_body.txt
